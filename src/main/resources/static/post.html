<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章详情</title>
    <style>
        :root { --bg:#f4f6fb; --card:#fff; --text:#1f2937; --muted:#6b7280; --brand:#2563eb; --shadow:0 8px 20px rgba(0,0,0,.06); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif; background: var(--bg); color: var(--text); }
        .container { max-width: 900px; margin: 0 auto; padding: 16px 14px 40px; }
        .back-link { display: inline-block; margin-bottom: 12px; text-decoration: none; color: var(--brand); font-weight: 600; }
        .card { background: var(--card); border-radius: 14px; box-shadow: var(--shadow); padding: 16px; margin-bottom: 12px; }
        .post-content, .comment-content { white-space: pre-wrap; word-break: break-word; line-height: 1.8; }
        .meta { margin-top: 10px; color: var(--muted); font-size: 12px; display:flex; justify-content: space-between; }
        textarea { width: 100%; min-height: 110px; border-radius: 10px; border: 1px solid #d7dbe5; padding: 10px 12px; resize: vertical; font-size: 14px; }
        textarea:focus { border-color: var(--brand); outline: none; box-shadow: 0 0 0 3px rgba(37,99,235,.15); }
        .actions { margin-top: 8px; display: flex; gap: 8px; flex-wrap: wrap; }
        button { border: 0; border-radius: 10px; padding: 10px 14px; cursor: pointer; font-weight: 600; }
        .btn-primary { background: var(--brand); color: #fff; }
        .btn-ghost { background: #edf2f7; color: #374151; }
        .comment { padding: 12px 0; border-bottom: 1px solid #edf1f5; }
        .comment:last-child { border-bottom: none; }
        .state { text-align: center; color: var(--muted); padding: 26px; }
        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; gap: 10px; }
        select { border-radius: 8px; border: 1px solid #d7dbe5; padding: 6px 8px; }
        .toast { position: fixed; right: 12px; bottom: 12px; background: #111827; color: #fff; padding: 10px 14px; border-radius: 10px; opacity: 0; transform: translateY(10px); transition: .2s; }
        .toast.show { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>
<div class="container" id="app">
    <a :href="backLink" class="back-link">← 返回列表</a>

    <div v-if="loading" class="state">加载中...</div>
    <div v-else-if="notFound" class="state">{{ notFoundMessage }}</div>

    <template v-else-if="post">
        <div class="card">
            <h2 style="margin-bottom:8px">正文</h2>
            <div class="post-content">{{ post.content }}</div>
            <div class="meta">
                <span>{{ formatDate(post.createdAt) }}</span>
                <span>ID: {{ post.id.slice(0, 8) }}...</span>
            </div>
        </div>

        <div class="card">
            <h3 style="margin-bottom:8px">💬 添加评论</h3>
            <textarea maxlength="1000" v-model="newComment" placeholder="写下你的想法（Ctrl/Cmd + Enter 可快速提交）"></textarea>
            <div class="actions">
                <button class="btn-primary" :disabled="!newComment.trim()" @click="submitComment">发布评论</button>
                <button class="btn-ghost" @click="newComment = ''">清空</button>
            </div>
        </div>

        <div class="card">
            <div class="toolbar">
                <h3>评论 ({{ comments.length }})</h3>
                <select v-model="sortMode">
                    <option value="asc">最早优先</option>
                    <option value="desc">最新优先</option>
                </select>
            </div>
            <p v-if="!comments.length" style="color:#9ca3af">暂无评论</p>
            <div v-for="comment in sortedComments" :key="comment.id" class="comment">
                <div class="comment-content">{{ comment.content }}</div>
                <div class="meta"><span>{{ formatDate(comment.createdAt) }}</span></div>
            </div>
        </div>
    </template>

    <div class="toast" :class="{show: toast.show}">{{ toast.text }}</div>
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script>
const { createApp, ref, computed, onMounted } = Vue
const LOCAL_POSTS_KEY = 'gshmd_local_posts_v3'
const CLOUD_POSTS_KEY = 'gshmd_cloud_posts_v2'
const LOCAL_COMMENTS_KEY = 'gshmd_local_comments_v1'

createApp({
    setup() {
        const post = ref(null)
        const comments = ref([])
        const newComment = ref('')
        const sortMode = ref('asc')
        const loading = ref(true)
        const notFound = ref(false)
        const notFoundMessage = ref('')
        const backLink = ref('index.html')
        const toast = ref({ show: false, text: '' })

        const showToast = (text) => {
            toast.value = { show: true, text }
            setTimeout(() => toast.value.show = false, 1600)
        }

        const sortedComments = computed(() => {
            const copy = [...comments.value]
            copy.sort((a,b) => new Date(a.createdAt) - new Date(b.createdAt))
            return sortMode.value === 'desc' ? copy.reverse() : copy
        })

        const formatDate = (dateStr) => !dateStr ? '' : new Date(dateStr).toLocaleString('zh-CN')
        const readJSON = (key, fallback) => { try { return JSON.parse(localStorage.getItem(key) || JSON.stringify(fallback)) } catch { return fallback } }
        const loadCustomPost = (postId) => {
            const local = readJSON(LOCAL_POSTS_KEY, []).find(p => p.id === postId)
            if (local) return local
            return readJSON(CLOUD_POSTS_KEY, []).find(p => p.id === postId)
        }

        const loadPostFromServer = async (postId, sourcePage) => {
            const index = await (await fetch('index.json')).json()
            const pages = (index.pages || []).map(x => x.page)
            const pagesToTry = []
            if (sourcePage && sourcePage !== 'custom') pagesToTry.push(Number(sourcePage))
            for (const p of pages) if (!pagesToTry.includes(p)) pagesToTry.push(p)

            for (const p of pagesToTry) {
                try {
                    const cacheKey = `gshmd_posts_page_${p}`
                    const cached = sessionStorage.getItem(cacheKey)
                    const pageData = cached ? JSON.parse(cached) : await (await fetch(`posts-${p}.json`)).json()
                    sessionStorage.setItem(cacheKey, JSON.stringify(pageData))
                    const found = pageData.find(x => x.id === postId)
                    if (found) return found
                } catch (_) {}
            }
            return null
        }

        const loadServerComments = async (postId) => {
            try {
                const safeId = postId.replace('/', '_')
                const cacheKey = `gshmd_comments_${safeId}`
                const cached = sessionStorage.getItem(cacheKey)
                if (cached) return JSON.parse(cached)
                const res = await fetch(`comments/${safeId}.json`)
                if (!res.ok) return []
                const data = await res.json()
                sessionStorage.setItem(cacheKey, JSON.stringify(data))
                return data
            } catch (_) { return [] }
        }

        const loadAllComments = async (postId) => {
            const serverComments = postId.startsWith('custom-') ? [] : await loadServerComments(postId)
            const localCommentsMap = readJSON(LOCAL_COMMENTS_KEY, {})
            const userComments = localCommentsMap[postId] || []
            comments.value = [...serverComments, ...userComments]
        }

        const submitComment = () => {
            const content = newComment.value.trim()
            if (!content) return
            const localCommentsMap = readJSON(LOCAL_COMMENTS_KEY, {})
            localCommentsMap[post.value.id] = localCommentsMap[post.value.id] || []
            localCommentsMap[post.value.id].push({ id: `local-comment-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`, content, createdAt: new Date().toISOString() })
            localStorage.setItem(LOCAL_COMMENTS_KEY, JSON.stringify(localCommentsMap))
            newComment.value = ''
            loadAllComments(post.value.id)
            showToast('评论已发布')
        }

        onMounted(async () => {
            const params = new URLSearchParams(window.location.search)
            const postId = params.get('id')
            const sourcePage = params.get('src')
            const q = params.get('q')
            if (q) backLink.value = `index.html?q=${encodeURIComponent(q)}`

            if (!postId) {
                notFound.value = true
                notFoundMessage.value = '请提供帖子 ID'
                loading.value = false
                return
            }

            const customPost = loadCustomPost(postId)
            post.value = customPost || await loadPostFromServer(postId, sourcePage)

            if (!post.value) {
                notFound.value = true
                notFoundMessage.value = '帖子不存在'
            } else {
                await loadAllComments(postId)
            }
            loading.value = false

            window.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') submitComment()
            })
        })

        return { post, comments, sortedComments, newComment, sortMode, loading, notFound, notFoundMessage, backLink, formatDate, submitComment, toast }
    }
}).mount('#app')
</script>
</body>
</html>
